# =============================================================================
# EsportsForge CI Pipeline
# Runs linting, testing, and Docker builds on push/PR to main.
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Backend Linting — flake8 + mypy
  # ---------------------------------------------------------------------------
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-lint-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 mypy types-redis

      - name: Run flake8
        run: flake8 app/ tests/ --max-line-length=120 --exclude=__pycache__,migrations

      - name: Run mypy
        # Strictness (strict_optional None-safety + warn_unused_ignores /
        # warn_redundant_casts / strict_equality) is configured in backend/mypy.ini.
        run: mypy app/ tests/

  # ---------------------------------------------------------------------------
  # VisionAudioForge Linting — flake8 + mypy
  # Both tools work on the AST without executing the code, so the heavy VAF deps
  # (torch/cv2/easyocr) are NOT installed here — the job stays fast. flake8 config
  # lives in services/visionaudioforge/.flake8 (max-line-length=120, E203/W503
  # ignored for black compatibility). mypy runs with --ignore-missing-imports, so
  # the uninstalled third-party libs (cv2/numpy/torch/easyocr) resolve to Any;
  # this enforces our own code's typing without the heavy-dep cost (numpy/cv2
  # call-level checking is out of scope by design, same trade-off as the backend job).
  # ---------------------------------------------------------------------------
  lint-vaf:
    name: Lint VisionAudioForge
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/visionaudioforge
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: pip install flake8 mypy

      - name: Run flake8
        run: flake8 app/

      - name: Run mypy
        # strict-optional (None-safety) is on by default; the warn flags add
        # dead-ignore / redundant-cast / non-overlapping-equality checks.
        run: mypy app/ --ignore-missing-imports --warn-unused-ignores --warn-redundant-casts --strict-equality

  # ---------------------------------------------------------------------------
  # VisionAudioForge Tests — pytest (light footprint, no torch/easyocr)
  # The vision adapter's ~90 tests previously ran NOWHERE in CI (only the backend
  # had a pytest job, so VAF regressions weren't gated). app/ imports the ML libs
  # lazily/guarded, so the CI-safe suite (OCR is faked) runs on requirements-ci.txt
  # — torch/torchvision/onnx/easyocr excluded (~800MB saved); the light onnxruntime
  # is kept so the play-clock ONNX reader tests run. One fixture-gated WS test skips.
  # ---------------------------------------------------------------------------
  test-vaf:
    name: Test VisionAudioForge
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/visionaudioforge
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-vaf-${{ hashFiles('services/visionaudioforge/requirements-ci.txt') }}
          restore-keys: pip-vaf-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run tests
        run: pytest -q

  # ---------------------------------------------------------------------------
  # Capture Agent Linting — flake8 + mypy
  # The capture-agent (HDMI capture -> WS -> VAF core) is a standalone Python
  # service that was previously unlinted. Same treatment as the VAF job: flake8/mypy
  # work on the AST, so its runtime deps (opencv, websockets) are NOT installed. flake8
  # config in agents/capture/.flake8; mypy runs with strict-optional (default) + the
  # same warn flags as backend/VAF (unused-ignores / redundant-casts / strict-equality).
  # ---------------------------------------------------------------------------
  lint-capture-agent:
    name: Lint Capture Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents/capture
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: pip install flake8 mypy

      - name: Run flake8
        run: flake8 capture_agent/

      - name: Run mypy
        run: mypy capture_agent/ --ignore-missing-imports --warn-unused-ignores --warn-redundant-casts --strict-equality

  # ---------------------------------------------------------------------------
  # Scripts Linting — flake8 (relaxed) + strict mypy
  # scripts/ are one-off calibration/tooling scripts, not a service. flake8 uses a
  # RELAXED config (scripts/.flake8: compact one-liner style allowed — E501/E701/E702/
  # E731 off — but the real-bug pyflakes F-codes stay on). mypy runs the same
  # strict-optional + warn flags as the services (full type-checking, no relaxation).
  # ---------------------------------------------------------------------------
  lint-scripts:
    name: Lint Scripts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: pip install flake8 mypy

      - name: Run flake8
        run: flake8 .

      - name: Run mypy
        run: mypy . --ignore-missing-imports --warn-unused-ignores --warn-redundant-casts --strict-equality

  # ---------------------------------------------------------------------------
  # Frontend Linting — ESLint + TypeScript check
  # ---------------------------------------------------------------------------
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-lint-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-lint-

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx next lint

      - name: Run TypeScript compiler check
        run: npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # Backend Tests — pytest with coverage
  # ---------------------------------------------------------------------------
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: esportsforge_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/esportsforge_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key-for-ci
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-test-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-test-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ---------------------------------------------------------------------------
  # Frontend Tests — Jest
  # ---------------------------------------------------------------------------
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-test-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-test-

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage --passWithNoTests

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ---------------------------------------------------------------------------
  # Build Backend Docker Image
  # ---------------------------------------------------------------------------
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: esportsforge-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Build Frontend Docker Image
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: [lint-frontend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: esportsforge-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
