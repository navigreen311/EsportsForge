# Example config for the EsportsForge Capture Agent (Phase 0 skeleton).
# Copy to config.dev.toml and fill in values for local dev.

[auth]
api_key = "esf-cap-dev-placeholder"
user_id = "5041bbe7-5d16-47c4-8f70-211935da55ea"

[core]
endpoint          = "ws://localhost:8100/ws/ingest"
fallback_endpoint = "ws://localhost:8100/ws/ingest"

[capture]
source     = "test-video"          # "test-video" | "file" (Phase 1a). capture-card/pc-monitor land in Phase 1.1
test_video = "./fixtures/madden_sample.mp4"

# File-mode ingestion (Phase 1a Day 0) — plays a recorded MP4 once through
# the production capture → WS → VAF core path (not the bypass harness):
#   source          = "file"
#   file            = "./fixtures/real/madden26_yt_baseline_cpu-vs-cpu.mp4"
#   playback_mode   = "realtime"   # "realtime" (live HDMI cadence) | "max" (throughput test)
#   normalize_1080p = true         # resize non-1080p sources to 1920x1080 for HUD alignment

[transport]
target_fps          = 12
adaptive            = true
adaptive_max_fps    = 24
jpeg_quality        = 75
batch_size          = 4
ring_buffer_seconds = 30

[diagnostics]
log_level = "INFO"
